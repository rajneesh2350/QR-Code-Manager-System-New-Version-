<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGIPESS A4 Header</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* A4 Page Setup Simulation */
        body {
            background-color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .a4-container {
            width: 210mm; /* Standard A4 Width */
            min-height: 50mm;
            padding: 10mm;
            margin: 20px auto;
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        /* Logo Sizing */
        .logo-side {
            width: 120px;
            height: auto;
        }

        /* Main Typography */
        .inst-hindi {
            font-size: 1.4rem;
            font-weight: 700;
            color: #000;
            margin: 0;
        }
        .inst-english {
            font-size: 1.3rem;
            font-weight: 700;
            color: #000;
            margin: 0;
            line-height: 1.2;
        }
        .address {
            font-size: 0.9rem;
            color: #333;
            margin-bottom: 8px;
        }

        /* THE CENTERPIECE - Bold & Max Font */
        .scan-highlight {
            font-size: 2.2rem; /* Maximum readable size for A4 width */
            font-weight: 900;
            color: #b32025; /* High contrast red */
            text-transform: uppercase;
            line-height: 1.1;
            margin-top: 15px;
            border-top: 2px solid #000;
            padding-top: 10px;
        }

        /* Remove margin for print */
        @media print {
            body { background: none; }
            .a4-container { margin: 0; box-shadow: none; width: 100%; }
        }
    </style>
</head>
<body>

<div class="a4-container">
    <div class="d-flex align-items-start justify-content-between text-center">

        <div class="flex-shrink-0">
            <img src="https://igipess.du.ac.in/images/igipesslogo1.png" alt="Left Logo" class="logo-side">
        </div>

        <div class="flex-grow-1 px-3">
            <h1 class="inst-hindi">इंदिरा गांधी शारीरिक शिक्षा एवं खेल विज्ञान संस्थान</h1>
            <p class="address">(दिल्ली विश्वविद्यालय, बी-ब्लॉक विकासपुरी, नई दिल्ली - 110018)</p>

            <h2 class="inst-english">
                Indira Gandhi Institute of Physical Education and Sports Sciences
            </h2>
            <p class="address">(University of Delhi, B-Block Vikaspuri, New Delhi - 110018)</p>

            <div class="scan-highlight">
                स्कैन करें और अपडेट रहें<br>
                SCAN TO STAY IN TOUCH
            </div>
        </div>

        <div class="flex-shrink-0">
            <img src="https://igipess.du.ac.in/QR-Code/logo2-removebg-preview.png" alt="Right Logo" class="logo-side">
        </div>

    </div>
</div>

</body>
</html>
